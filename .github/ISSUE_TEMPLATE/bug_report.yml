name: Bug report
description: Report broken behavior, a regression, or a crash.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Search open and closed issues first, and keep the report focused on one problem.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction you have. If the problem is intermittent, explain when it occurs.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iPhone
        - iPad
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include the OS version and Computer Solitaire version when known.
      placeholder: macOS 26.2, Computer Solitaire 1.0
    validations:
      required: true

  - type: dropdown
    id: game
    attributes:
      label: Game variant
      options:
        - Klondike
        - FreeCell
        - Not game-specific
    validations:
      required: true

  - type: textarea
    id: game-context
    attributes:
      label: Game settings or context
      description: Include relevant settings such as draw mode or scoring mode, and describe the state of the game when the problem occurred.

  - type: textarea
    id: evidence
    attributes:
      label: Additional evidence
      description: Add relevant screenshots, recordings, logs, or crash reports. Redact sensitive information.
