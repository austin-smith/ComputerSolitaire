included:
  - ComputerSolitaire
  - ComputerSolitaireTests
  - ComputerSolitaireUITests

strict: true
check_for_updates: false
allow_zero_lintable_files: false
reporter: github-actions-logging

disabled_rules:
  - todo

opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - async_without_await
  - balanced_xctest_lifecycle
  - discarded_notification_center_observer
  - force_unwrapping
  - unhandled_throwing_task

# These metric rules remain active, with thresholds calibrated to the existing
# game and SwiftUI architecture. They prevent growth without forcing lint-only
# decomposition of cohesive rendering and game-logic code.
cyclomatic_complexity:
  warning: 20
  error: 30

function_body_length:
  warning: 250
  error: 300

function_parameter_count:
  warning: 7
  error: 9
  ignores_default_parameters: true

large_tuple:
  warning: 4
  error: 5

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 2

type_body_length:
  warning: 1500
  error: 2000

file_length:
  warning: 800
  error: 800

# Conventional mathematical, coordinate, and search-algorithm identifiers.
identifier_name:
  excluded:
    - id
    - a
    - b
    - f
    - g
    - n
    - w
    - h
    - x
    - y
    - dx
    - dy
    - dt
    - px
    - cx
    - cy
